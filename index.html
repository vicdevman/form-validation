<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="form-container">
      <div class="form-card">
        <header>
          <h1>Welcome back</h1>
          <p>Enter your credentials to access your account</p>
        </header>

        <div class="group">
          <label for="email">Email Address</label>
          <div class="input-container">
            <input
              id="email"
              type="email"
              placeholder="name@company.com"
              autocomplete="email"
            />
            <span class="status-icon" id="emailStatus"></span>
          </div>
          <div id="emailText" class="note"></div>
        </div>

        <div class="group">
          <label for="password">Password</label>
          <div class="input-container">
            <input
              id="password"
              type="password"
              placeholder="••••••••"
              autocomplete="current-password"
            />
            <button
              type="button"
              id="togglePassword"
              class="toggle-btn"
              aria-label="Toggle password visibility"
            >
              <svg
                class="eye-icon"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                <circle cx="12" cy="12" r="3"></circle>
              </svg>
            </button>
          </div>
          <div class="meter"><div id="strength"></div></div>
          <div id="passText" class="note"></div>
          <div id="feedback" class="feedback-list"></div>
        </div>

        <button id="login" class="submit-btn">
          <span>Sign in</span>
          <div class="spinner"></div>
        </button>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
